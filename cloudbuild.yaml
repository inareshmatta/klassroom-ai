steps:
  # Build the container image for the Python backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/shivy-ai', './backend']
    
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/shivy-ai']
    
  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'shivy-ai'
      - '--image'
      - 'gcr.io/$PROJECT_ID/shivy-ai'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--set-env-vars'
      - 'CORS_ORIGINS=https://shivy-ai.web.app,http://localhost:5173'

images:
  - 'gcr.io/$PROJECT_ID/shivy-ai'

options:
  logging: CLOUD_LOGGING_ONLY
